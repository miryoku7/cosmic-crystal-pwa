<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#06060f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CosmicCrystal">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="コズミッククリスタル - 宇宙のクリッカーゲーム">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<title>コズミッククリスタル</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== RESET & ROOT ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#06060f;--panel:rgba(12,12,30,0.9);--border:rgba(100,140,255,0.18);
  --accent:#6cf;--accent2:#c084fc;--accent3:#f472b6;--gold:#fbbf24;
  --text:#e0e8ff;--dim:#6b7db3;
  --glow:0 0 20px rgba(102,204,255,0.3);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}
html{font-size:14px;height:100%;overflow:hidden}
body{
  font-family:'Zen Kaku Gothic New','Rajdhani',sans-serif;
  background:var(--bg);color:var(--text);
  height:100%;overflow:hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%,rgba(102,204,255,0.04) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(192,132,252,0.04) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 80%,rgba(244,114,182,0.03) 0%,transparent 50%);
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bottom);
  padding-left:var(--safe-left);
  padding-right:var(--safe-right);
}

/* ===== STARS ===== */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.stars span{
  position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite alternate;opacity:0.3;
}
@keyframes twinkle{0%{opacity:0.2;transform:scale(1)}100%{opacity:0.8;transform:scale(1.5)}}

/* ===== APP LAYOUT (Mobile-first) ===== */
.app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  height:100%;overflow:hidden;
}

/* ===== HEADER ===== */
.header{
  flex-shrink:0;
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(20px);background:rgba(6,6,15,0.85);
  gap:8px;
}
.header h1{
  font-family:'Orbitron',sans-serif;font-size:0.85rem;letter-spacing:2px;
  background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-transform:uppercase;white-space:nowrap;flex-shrink:0;
}
.header-stats{
  display:flex;gap:10px;font-family:'Rajdhani',sans-serif;
  font-size:0.78rem;color:var(--dim);flex-wrap:wrap;justify-content:flex-end;
}
.header-stats span{display:flex;align-items:center;gap:3px}
.header-stats .val{color:var(--gold);font-weight:700}
.prestige-display{
  display:flex;align-items:center;gap:4px;padding:4px 10px;
  background:rgba(192,132,252,0.08);border:1px solid rgba(192,132,252,0.2);
  border-radius:20px;font-size:0.78rem;
}
.prestige-display .pd-val{color:var(--accent2);font-weight:700;font-family:'Rajdhani',sans-serif}

/* ===== CENTER AREA ===== */
.center{
  flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px 8px 12px;
  position:relative;
}
.counter-display{text-align:center;margin-bottom:16px}
.counter-amount{
  font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:900;
  background:linear-gradient(135deg,#fff,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.2;
}
.counter-label{font-size:0.75rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px}

/* ===== CRYSTAL ===== */
.crystal-wrap{
  position:relative;cursor:pointer;user-select:none;
  touch-action:manipulation;
}
.crystal-wrap:active .crystal-main{transform:scale(0.9)}
.crystal-main{
  width:140px;height:140px;position:relative;transition:transform 0.1s;
  filter:drop-shadow(0 0 30px rgba(102,204,255,0.5)) drop-shadow(0 0 60px rgba(192,132,252,0.25));
}
.crystal-svg{width:100%;height:100%}
.crystal-pulse{
  position:absolute;inset:-24px;border-radius:50%;
  background:radial-gradient(circle,rgba(102,204,255,0.15) 0%,transparent 70%);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.15);opacity:1}}
.crystal-ring{
  position:absolute;inset:-32px;border:1px solid rgba(102,204,255,0.15);
  border-radius:50%;animation:ringRotate 12s linear infinite;
}
.crystal-ring::before{
  content:'✦';position:absolute;top:-6px;left:50%;transform:translateX(-50%);
  color:var(--accent);font-size:0.6rem;
}
.crystal-ring:nth-child(2){inset:-44px;animation-duration:18s;animation-direction:reverse;border-color:rgba(192,132,252,0.1)}
.crystal-ring:nth-child(2)::before{color:var(--accent2)}
@keyframes ringRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.crystal-shine{
  position:absolute;inset:0;
  background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.15) 50%,transparent 70%);
  animation:shine 3s ease-in-out infinite;border-radius:50%;
}
@keyframes shine{0%,100%{opacity:0;transform:scale(0.8)}50%{opacity:1;transform:scale(1.05)}}

/* ===== CLICK PARTICLES ===== */
.click-particle{
  position:absolute;pointer-events:none;font-family:'Orbitron',sans-serif;
  font-weight:900;font-size:1rem;color:var(--gold);
  text-shadow:0 0 10px rgba(251,191,36,0.5);
  animation:floatUp 0.9s ease-out forwards;z-index:10;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-70px) scale(0.5)}
}

/* ===== PER-SEC BAR ===== */
.per-sec-bar{
  margin-top:10px;padding:6px 16px;background:rgba(102,204,255,0.05);
  border:1px solid var(--border);border-radius:20px;font-size:0.78rem;
  display:flex;align-items:center;gap:6px;
}
.per-sec-bar .psb-label{color:var(--dim)}
.per-sec-bar .psb-val{color:var(--accent);font-weight:700;font-family:'Rajdhani',sans-serif}

/* ===== BOTTOM NAV ===== */
.bottom-nav{
  flex-shrink:0;
  display:flex;border-top:1px solid var(--border);
  background:rgba(6,6,15,0.9);backdrop-filter:blur(20px);
}
.nav-btn{
  flex:1;padding:10px 4px 8px;border:none;background:none;
  color:var(--dim);font-family:inherit;font-size:0.6rem;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:all 0.2s;border-top:2px solid transparent;
  touch-action:manipulation;
}
.nav-btn .nav-icon{font-size:1.3rem;line-height:1}
.nav-btn.active{color:var(--accent);border-top-color:var(--accent)}
.nav-btn:active{opacity:0.7}

/* ===== PANEL AREA ===== */
.panel-area{
  flex:1;overflow:hidden;position:relative;
}
.panel-view{
  display:none;height:100%;overflow-y:auto;
  overscroll-behavior:contain;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:rgba(102,204,255,0.2) transparent;
}
.panel-view.active{display:block}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(102,204,255,0.2);border-radius:2px}

.panel-section{padding:12px 14px}
.panel-title{
  font-family:'Orbitron',sans-serif;font-size:0.65rem;letter-spacing:3px;
  text-transform:uppercase;color:var(--dim);margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.panel-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* ===== BUY AMOUNT ===== */
.buy-amount{display:flex;gap:4px;margin-bottom:10px}
.buy-btn{
  flex:1;padding:7px 4px;border:1px solid var(--border);background:rgba(255,255,255,0.02);
  color:var(--dim);border-radius:8px;font-family:inherit;font-size:0.72rem;
  cursor:pointer;transition:all 0.2s;touch-action:manipulation;
}
.buy-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(102,204,255,0.08)}

/* ===== FACILITY CARDS ===== */
.facility-card{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:12px;margin-bottom:8px;cursor:pointer;transition:all 0.2s;
  display:grid;grid-template-columns:44px 1fr auto;gap:10px;align-items:center;
  touch-action:manipulation;
}
.facility-card:active{transform:scale(0.98);opacity:0.85}
.facility-card.locked{opacity:0.3;pointer-events:none}
.facility-card.affordable{border-color:rgba(251,191,36,0.4);box-shadow:0 0 12px rgba(251,191,36,0.1)}
.fac-icon{font-size:1.8rem;text-align:center;line-height:1}
.fac-info h3{font-size:0.88rem;font-weight:700}
.fac-info .fac-desc{font-size:0.7rem;color:var(--dim);margin-top:2px}
.fac-info .fac-prod{font-size:0.7rem;color:var(--accent);margin-top:2px}
.fac-right{text-align:right}
.fac-cost{font-family:'Rajdhani',sans-serif;font-size:0.88rem;color:var(--gold);font-weight:700}
.fac-owned{font-size:0.7rem;color:var(--dim);margin-top:2px}

/* ===== UPGRADE GRID ===== */
.upgrade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:8px}
.upgrade-card{
  border-radius:12px;border:2px solid var(--border);
  background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px 6px;gap:3px;
  cursor:pointer;transition:all 0.2s;position:relative;
  touch-action:manipulation;min-height:72px;
}
.upgrade-card .uc-icon{font-size:1.5rem;line-height:1}
.upgrade-card .uc-name{font-size:0.55rem;color:var(--dim);text-align:center;line-height:1.2;word-break:break-all}
.upgrade-card:active{transform:scale(0.94)}
.upgrade-card.bought{border-color:rgba(251,191,36,0.4);background:rgba(251,191,36,0.06)}
.upgrade-card.bought .uc-name{color:var(--gold)}
.upgrade-card.locked{opacity:0.2;pointer-events:none}
.upgrade-card.available{border-color:rgba(102,204,255,0.5);box-shadow:0 0 10px rgba(102,204,255,0.15)}
.upgrade-card.can-afford{border-color:rgba(251,191,36,0.5);box-shadow:0 0 10px rgba(251,191,36,0.15)}

/* ===== REINCARNATION ===== */
.reincarnation-panel{
  background:linear-gradient(135deg,rgba(244,114,182,0.08),rgba(192,132,252,0.08));
  border:1px solid rgba(244,114,182,0.2);border-radius:12px;padding:14px;margin-bottom:12px;
}
.reinc-title{font-family:'Orbitron',sans-serif;font-size:0.75rem;color:var(--accent3);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.reinc-info{font-size:0.78rem;color:var(--dim);line-height:1.8}
.reinc-info .highlight{color:var(--accent2);font-weight:700}
.reinc-btn{
  width:100%;margin-top:12px;padding:13px;border:2px solid var(--accent3);
  background:rgba(244,114,182,0.1);color:var(--accent3);border-radius:10px;
  font-family:'Orbitron',sans-serif;font-size:0.78rem;cursor:pointer;
  transition:all 0.3s;letter-spacing:2px;touch-action:manipulation;
}
.reinc-btn:active{transform:scale(0.97)}
.reinc-btn:disabled{opacity:0.3;cursor:not-allowed}

/* ===== STATS ===== */
.stat-row{
  display:flex;justify-content:space-between;padding:8px 0;
  border-bottom:1px solid rgba(100,140,255,0.06);font-size:0.8rem;
}
.stat-row .stat-label{color:var(--dim)}
.stat-row .stat-val{color:var(--text);font-weight:600;font-family:'Rajdhani',sans-serif}

/* ===== ACHIEVEMENTS ===== */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:8px}
.ach-item{
  border-radius:10px;border:1px solid var(--border);
  background:var(--panel);display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;position:relative;transition:all 0.2s;
  min-height:52px;cursor:pointer;touch-action:manipulation;
}
.ach-item.unlocked{border-color:rgba(251,191,36,0.5);background:rgba(251,191,36,0.05)}
.ach-item.locked{opacity:0.2;filter:grayscale(1)}

/* ===== NOTIFICATION ===== */
.notif-container{
  position:fixed;top:calc(var(--safe-top) + 60px);right:12px;
  z-index:3000;display:flex;flex-direction:column;gap:6px;
  pointer-events:none;
}
.notif{
  padding:10px 14px;background:rgba(12,12,30,0.95);border:1px solid var(--gold);
  border-radius:10px;font-size:0.78rem;color:var(--gold);
  animation:notifIn 0.3s ease-out,notifOut 0.3s ease-in 2.7s forwards;
  backdrop-filter:blur(10px);max-width:260px;
}
@keyframes notifIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes notifOut{from{opacity:1}to{opacity:0;transform:translateY(-16px)}}

/* ===== MODAL (汎用) ===== */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:4000;
  align-items:flex-end;justify-content:center;backdrop-filter:blur(6px);
  padding-bottom:var(--safe-bottom);
}
.modal-overlay.open{display:flex}
.modal{
  background:#0d0d22;border:1px solid var(--border);border-radius:20px 20px 0 0;
  padding:20px 20px calc(16px + var(--safe-bottom));width:100%;max-width:480px;
  animation:modalUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
  max-height:90vh;overflow-y:auto;
}
@keyframes modalUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 16px}
.modal h2{font-family:'Orbitron',sans-serif;font-size:1rem;margin-bottom:10px;
  background:linear-gradient(135deg,var(--accent3),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal p{font-size:0.82rem;color:var(--dim);line-height:1.7;margin-bottom:16px}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btn{
  flex:1;padding:12px 16px;border-radius:10px;font-family:inherit;font-size:0.85rem;
  cursor:pointer;border:none;transition:all 0.2s;touch-action:manipulation;
}
.modal-btn.confirm{background:var(--accent3);color:#fff;font-weight:700}
.modal-btn.confirm:active{filter:brightness(1.2)}
.modal-btn.cancel{background:rgba(255,255,255,0.05);color:var(--dim);border:1px solid var(--border)}

/* ===== UPGRADE DETAIL MODAL ===== */
.upg-modal-icon{font-size:3rem;text-align:center;margin-bottom:8px}
.upg-modal-name{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--accent);text-align:center;margin-bottom:4px}
.upg-modal-type{font-size:0.7rem;color:var(--dim);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.upg-modal-desc{
  background:rgba(102,204,255,0.05);border:1px solid var(--border);
  border-radius:10px;padding:12px;margin-bottom:14px;
}
.upg-modal-desc .desc-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:0.82rem}
.upg-modal-desc .desc-row:not(:last-child){border-bottom:1px solid rgba(100,140,255,0.08)}
.upg-modal-desc .desc-label{color:var(--dim)}
.upg-modal-desc .desc-val{color:var(--text);font-weight:700;font-family:'Rajdhani',sans-serif}
.upg-modal-desc .desc-val.highlight{color:var(--gold)}
.upg-modal-desc .desc-val.green{color:#4ade80}
.upg-modal-status{
  text-align:center;padding:8px;border-radius:8px;font-size:0.8rem;font-weight:700;
  margin-bottom:14px;
}
.upg-modal-status.bought{background:rgba(251,191,36,0.1);color:var(--gold);border:1px solid rgba(251,191,36,0.3)}
.upg-modal-status.available{background:rgba(102,204,255,0.08);color:var(--accent);border:1px solid rgba(102,204,255,0.3)}
.upg-modal-status.locked{background:rgba(255,255,255,0.03);color:var(--dim);border:1px solid var(--border)}

/* ===== REINC UPGRADE GRID ===== */
.reinc-upg-list{display:flex;flex-direction:column;gap:8px}
.reinc-upg-card{
  background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:12px;display:grid;grid-template-columns:44px 1fr auto;gap:10px;align-items:center;
  cursor:pointer;transition:all 0.2s;touch-action:manipulation;
}
.reinc-upg-card:active{transform:scale(0.98)}
.reinc-upg-card.bought{border-color:rgba(251,191,36,0.3);opacity:0.7;pointer-events:none}
.reinc-upg-card.can-afford{border-color:rgba(192,132,252,0.5);box-shadow:0 0 12px rgba(192,132,252,0.15)}
.reinc-upg-card.locked{opacity:0.3;pointer-events:none}
.ruc-icon{font-size:1.6rem;text-align:center}
.ruc-info h3{font-size:0.85rem;font-weight:700}
.ruc-info .ruc-desc{font-size:0.7rem;color:var(--dim);margin-top:2px}
.ruc-right{text-align:right}
.ruc-cost{font-family:'Rajdhani',sans-serif;font-size:0.85rem;color:var(--accent2);font-weight:700}
.ruc-status{font-size:0.65rem;margin-top:2px}
.ruc-status.owned{color:var(--gold)}
.ruc-status.locked{color:var(--dim)}

/* ===== INSTALL BANNER ===== */
.install-banner{
  display:none;position:fixed;bottom:calc(56px + var(--safe-bottom));left:12px;right:12px;
  background:rgba(12,12,30,0.97);border:1px solid var(--accent);border-radius:14px;
  padding:12px 16px;z-index:2000;backdrop-filter:blur(20px);
  flex-direction:row;align-items:center;gap:12px;
  animation:notifIn 0.3s ease-out;
}
.install-banner.show{display:flex}
.install-banner-text{flex:1;font-size:0.78rem;color:var(--text)}
.install-banner-text strong{color:var(--accent);display:block;margin-bottom:2px}
.install-banner-btns{display:flex;gap:6px;flex-shrink:0}
.ib-btn{
  padding:7px 12px;border-radius:8px;font-size:0.75rem;font-family:inherit;
  cursor:pointer;border:none;touch-action:manipulation;
}
.ib-btn.install{background:var(--accent);color:#06060f;font-weight:700}
.ib-btn.dismiss{background:rgba(255,255,255,0.05);color:var(--dim);border:1px solid var(--border)}

/* ===== LANDSCAPE LAYOUT ===== */
@media(orientation:landscape) and (max-height:500px){
  .center{padding:8px;flex-direction:row;gap:16px}
  .crystal-main{width:100px;height:100px}
  .counter-amount{font-size:1.6rem}
  .counter-display{margin-bottom:0}
  .per-sec-bar{margin-top:6px}
}

/* ===== TABLET / DESKTOP ===== */
@media(min-width:768px){
  html{font-size:15px}
  .app{flex-direction:row;flex-wrap:wrap;height:100%}
  .header{width:100%;flex-shrink:0}
  .center{
    width:300px;flex-shrink:0;
    border-right:1px solid var(--border);
    height:calc(100% - 50px); /* header height */
    overflow:hidden;
  }
  .panel-area{
    flex:1;min-width:0;
    height:calc(100% - 50px);
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr;
  }
  .bottom-nav{display:none}
  /* Desktop: show facilities+upgrades on left, achievements on right */
  #view-facilities{display:block!important;border-right:1px solid var(--border)}
  #view-reinc{display:none!important}
  #view-achiev{display:block!important}
  #view-stats{display:none!important}
  .crystal-main{width:160px;height:160px}
  .counter-amount{font-size:2.4rem}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="notif-container" id="notifs"></div>

<!-- ===== REINCARNATION CONFIRM MODAL ===== -->
<div class="modal-overlay" id="reincModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>⟡ 転生確認 ⟡</h2>
    <p>
      全ての施設・アップグレードがリセットされます。<br>

<script>

function fmt(n) {
  if (n < 1e3) return Math.floor(n).toLocaleString();
  const units = ['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc'];
  let i = 0;
  while (n >= 1e3 && i < units.length - 1) { n /= 1e3; i++; }
  return (i === 0 ? Math.floor(n) : n.toFixed(2)) + units[i];
}
function fmtFull(n) { return Math.floor(n).toLocaleString(); }

// ==================== FACILITIES ====================
const FACILITIES = [

function getFacCost(fac, count) {
  return Math.ceil(fac.baseCost * Math.pow(fac.costMult, count));
}
function getBulkCost(fac, owned, amount) {
  let total = 0;
  for (let i = 0; i < amount; i++) total += getFacCost(fac, owned + i);
  return total;
}
function getMaxBuy(fac, owned, budget) {
  let count = 0, total = 0;
  while (true) {
    const c = getFacCost(fac, owned + count);
    if (total + c > budget) break;
    total += c;
    count++;
    if (count > 10000) break;
  }
  return count;
}
function getFacProd(fac) {
  const owned = G.facilities[fac.id] || 0;
  let mult = 1;
  for (const u of UPGRADES) {
    if (u.type === 'facility' && u.target === fac.id && G.upgrades[u.id]) mult *= u.mult;
  }
  for (const u of UPGRADES) {
    if (u.type === 'allprod' && G.upgrades[u.id]) mult *= u.mult;
  }
  for (const u of REINC_UPGRADES) {
    if (u.type === 'allprod' && G.reincUpgrades[u.id]) mult *= u.mult;
  }
  mult *= (1 + G.soulCrystals * 0.05);
  return fac.baseProd * owned * mult;
}

// ==================== CORE ====================
function getClickValue() {
  let val = 1;
  for (const u of UPGRADES) {
    if (u.type === 'click' && G.upgrades[u.id]) val *= u.mult;
  }
  for (const u of REINC_UPGRADES) {
    if (u.type === 'click' && G.reincUpgrades[u.id]) val *= u.mult;
  }
  val *= (1 + G.soulCrystals * 0.05);
  return val;
}
function getPerSec() {
  let total = 0;
  for (const fac of FACILITIES) total += getFacProd(fac);
  return total;
}
function calcReincSouls() {
  // 今回の周回で稼いだクリスタルを基にソウルを計算
  return Math.floor(Math.sqrt(G.runCrystals / 1e6));
}

// ==================== CLICK ====================
function doClick(e) {
  const val = getClickValue();
  G.crystals += val;
  G.totalCrystals += val;
  G.runCrystals += val;
  G.totalClicks++;
  G.totalAllTime += val;
  spawnParticle(e, val);
}
function spawnParticle(e, val) {
  const btn = document.getElementById('crystalBtn');
  const rect = btn.getBoundingClientRect();
  const p = document.createElement('div');
  p.className = 'click-particle';
  p.textContent = '+' + fmt(val);
  const cx = e.clientX !== undefined ? e.clientX : rect.left + rect.width / 2;
  const cy = e.clientY !== undefined ? e.clientY : rect.top + rect.height / 2;
  p.style.left = (cx - rect.left + (Math.random() - 0.5) * 40) + 'px';
  p.style.top = (cy - rect.top - 20) + 'px';
  btn.appendChild(p);
  setTimeout(() => p.remove(), 900);
}

// ==================== BUY ====================
function buyFacility(id) {
  const fac = FACILITIES.find(f => f.id === id);
  const owned = G.facilities[id] || 0;
  let amount = buyAmount === -1 ? getMaxBuy(fac, owned, G.crystals) : buyAmount;
  if (amount <= 0) return;
  const cost = getBulkCost(fac, owned, amount);
  if (G.crystals >= cost) {
    G.crystals -= cost;
    G.facilities[id] = owned + amount;
    renderFacilities();
  }
}

// アップグレードはタップで詳細モーダルを表示
function openUpgradeModal(id) {
  const u = UPGRADES.find(x => x.id === id);
  if (!u) return;
  const bought = !!G.upgrades[id];
  const available = u.req();
  const canAfford = G.crystals >= u.cost;

  document.getElementById('upgModalIcon').textContent = u.icon;
  document.getElementById('upgModalName').textContent = u.name;

  // Type label
  const typeLabels = { click:'クリック強化', facility:'施設強化', allprod:'全施設強化' };
  document.getElementById('upgModalType').textContent = typeLabels[u.type] || '';

  // Detail rows
  let rows = `
    <div class="desc-row"><span class="desc-label">効果</span><span class="desc-val green">${u.desc}</span></div>
    <div class="desc-row"><span class="desc-label">倍率</span><span class="desc-val highlight">×${u.mult}</span></div>`;
  if (u.type === 'facility') {
    const fac = FACILITIES.find(f => f.id === u.target);
    if (fac) rows += `<div class="desc-row"><span class="desc-label">対象施設</span><span class="desc-val">${fac.icon} ${fac.name}</span></div>`;
  }
  if (!bought) {
    rows += `<div class="desc-row"><span class="desc-label">コスト</span><span class="desc-val highlight">${fmt(u.cost)} クリスタル</span></div>`;
    if (available) {
      rows += `<div class="desc-row"><span class="desc-label">所持クリスタル</span><span class="desc-val ${canAfford ? 'green' : ''}">${fmt(G.crystals)}</span></div>`;
    }
  }
  document.getElementById('upgModalDesc').innerHTML = rows;

  // Status
  const statusEl = document.getElementById('upgModalStatus');
  if (bought) {
    statusEl.className = 'upg-modal-status bought';
    statusEl.textContent = '✓ 取得済み';
  } else if (!available) {
    statusEl.className = 'upg-modal-status locked';
    statusEl.textContent = '🔒 解放条件未達成';
  } else if (canAfford) {
    statusEl.className = 'upg-modal-status available';
    statusEl.textContent = '✦ 購入可能';
  } else {
    statusEl.className = 'upg-modal-status locked';
    statusEl.textContent = `クリスタルが ${fmt(u.cost - G.crystals)} 不足`;
  }

  // Buttons
  const btnsEl = document.getElementById('upgModalBtns');
  if (!bought && available && canAfford) {
    btnsEl.innerHTML = `
      <button class="modal-btn cancel" onclick="closeModal('upgModal')">閉じる</button>
      <button class="modal-btn confirm" onclick="confirmBuyUpgrade('${id}')">購入する</button>`;
  } else {
    btnsEl.innerHTML = `<button class="modal-btn cancel" onclick="closeModal('upgModal')" style="max-width:160px;margin:0 auto">閉じる</button>`;
  }

  document.getElementById('upgModal').classList.add('open');
}

function confirmBuyUpgrade(id) {
  const u = UPGRADES.find(x => x.id === id);
  if (!u || G.upgrades[id] || G.crystals < u.cost || !u.req()) return;
  G.crystals -= u.cost;
  G.upgrades[id] = true;
  closeModal('upgModal');
  notify('🔧 ' + u.name + ' を取得！');
  renderUpgrades();
}

function openReincUpgradeModal(id) {
  const u = REINC_UPGRADES.find(x => x.id === id);
  if (!u) return;
  const bought = !!G.reincUpgrades[id];
  const canAfford = G.soulCrystals >= u.cost;

  document.getElementById('upgModalIcon').textContent = u.icon;
  document.getElementById('upgModalName').textContent = u.name;
  document.getElementById('upgModalType').textContent = '転生アップグレード（永続）';

  const typeLabels = { click:'クリック強化', allprod:'全施設強化' };
  let rows = `
    <div class="desc-row"><span class="desc-label">効果</span><span class="desc-val green">${u.desc}</span></div>
    <div class="desc-row"><span class="desc-label">倍率</span><span class="desc-val highlight">×${u.mult}</span></div>
    <div class="desc-row"><span class="desc-label">種別</span><span class="desc-val">${typeLabels[u.type] || ''}</span></div>`;
  if (!bought) {
    rows += `<div class="desc-row"><span class="desc-label">コスト</span><span class="desc-val highlight">${u.cost} ソウルクリスタル</span></div>`;
    rows += `<div class="desc-row"><span class="desc-label">所持ソウル</span><span class="desc-val ${canAfford ? 'green' : ''}">${fmtFull(G.soulCrystals)}</span></div>`;
  }
  document.getElementById('upgModalDesc').innerHTML = rows;

  const statusEl = document.getElementById('upgModalStatus');
  if (bought) {
    statusEl.className = 'upg-modal-status bought';
    statusEl.textContent = '✓ 取得済み（転生後も有効）';
  } else if (canAfford) {
    statusEl.className = 'upg-modal-status available';
    statusEl.textContent = '✦ 購入可能';
  } else {
    statusEl.className = 'upg-modal-status locked';
    statusEl.textContent = `ソウルが ${u.cost - G.soulCrystals} 不足`;
  }

  const btnsEl = document.getElementById('upgModalBtns');
  if (!bought && canAfford) {
    btnsEl.innerHTML = `
      <button class="modal-btn cancel" onclick="closeModal('upgModal')">閉じる</button>
      <button class="modal-btn confirm" onclick="confirmBuyReincUpgrade('${id}')">購入する</button>`;
  } else {
    btnsEl.innerHTML = `<button class="modal-btn cancel" onclick="closeModal('upgModal')" style="max-width:160px;margin:0 auto">閉じる</button>`;
  }

  document.getElementById('upgModal').classList.add('open');
}

function confirmBuyReincUpgrade(id) {
  const u = REINC_UPGRADES.find(x => x.id === id);
  if (!u || G.reincUpgrades[id] || G.soulCrystals < u.cost) return;
  G.soulCrystals -= u.cost;
  G.reincUpgrades[id] = true;
  closeModal('upgModal');
  notify('💎 ' + u.name + ' を取得！');
  renderReincUpgrades();
}

// ==================== REINCARNATION ====================
function openReincModal() {
  const souls = calcReincSouls();
  if (souls < 1) return;
  document.getElementById('modalSouls').textContent = fmt(souls);
  document.getElementById('reincModal').classList.add('open');
}
function closeReincModal() {
  document.getElementById('reincModal').classList.remove('open');
}
function doReincarnation() {
  const souls = calcReincSouls();
  if (souls < 1) return;
  G.soulCrystals += souls;
  G.totalSoulCrystals += souls;
  G.reincarnations++;
  // 現在の所持クリスタルと施設・通常アップグレードのみリセット
  // totalCrystals・totalClicks・totalAllTime は累計なので引き継ぐ
  G.crystals = 0;
  G.runCrystals = 0; // 今回の周回クリスタルをリセット（次の周回の開始）
  G.facilities = {};
  G.upgrades = {};
  closeReincModal();
  saveGame();
  notify('🌀 転生完了！+' + fmt(souls) + ' ソウルクリスタル');
  renderAll();
}

// ==================== MODALS ====================
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
// Tap outside modal to close
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });
});

// Achievement detail
function openAchModal(id) {
  const a = ACHIEVEMENTS.find(x => x.id === id);
  if (!a) return;
  const unlocked = G.achievements.has(id);
  document.getElementById('achModalIcon').textContent = a.icon;
  document.getElementById('achModalName').textContent = a.name;
  document.getElementById('achModalDesc').textContent = a.desc;
  const statusEl = document.getElementById('achModalStatus');
  if (unlocked) {
    statusEl.className = 'upg-modal-status bought';
    statusEl.textContent = '✓ 達成済み';
  } else {
    statusEl.className = 'upg-modal-status locked';
    statusEl.textContent = '未達成';
  }
  document.getElementById('achModal').classList.add('open');
}

// ==================== RENDER ====================
function renderFacilities() {
  const el = document.getElementById('facilityList');
  el.innerHTML = '';
  for (const fac of FACILITIES) {
    const owned = G.facilities[fac.id] || 0;
    let amount = buyAmount === -1 ? getMaxBuy(fac, owned, G.crystals) : buyAmount;
    if (amount < 1 && buyAmount === -1) amount = 1;
    const cost = getBulkCost(fac, owned, amount);
    const prod = getFacProd(fac);
    const canAfford = G.crystals >= cost;
    const unlocked = G.totalCrystals >= fac.baseCost * 0.5 || owned > 0;
    const card = document.createElement('div');
    card.className = 'facility-card' + (!unlocked ? ' locked' : '') + (canAfford && unlocked ? ' affordable' : '');
    card.onclick = () => buyFacility(fac.id);
    const amountLabel = buyAmount === -1 ? (amount > 1 ? `×${amount}` : '×1') : `×${buyAmount}`;
    card.innerHTML = `
      <div class="fac-icon">${fac.icon}</div>
      <div class="fac-info">
        <h3>${fac.name}</h3>
        <div class="fac-desc">${fac.desc}</div>
        ${owned > 0 ? `<div class="fac-prod">${fmt(prod)}/s</div>` : ''}
      </div>
      <div class="fac-right">
        <div class="fac-cost">${fmt(cost)}</div>
        <div class="fac-owned">${owned > 0 ? `所持: ${owned}` : amountLabel}</div>
      </div>`;
    el.appendChild(card);
  }
}

function renderUpgrades() {
  const el = document.getElementById('upgradeGrid');
  el.innerHTML = '';
  for (const u of UPGRADES) {
    const bought = !!G.upgrades[u.id];
    const available = u.req();
    const canAfford = available && G.crystals >= u.cost;
    const card = document.createElement('div');
    let cls = 'upgrade-card';
    if (bought) cls += ' bought';
    else if (!available) cls += ' locked';
    else if (canAfford) cls += ' can-afford';
    else cls += ' available';
    card.className = cls;
    card.onclick = () => openUpgradeModal(u.id);
    card.innerHTML = `<div class="uc-icon">${u.icon}</div><div class="uc-name">${u.name}</div>`;
    el.appendChild(card);
  }
}

function renderReincUpgrades() {
  const el = document.getElementById('reincUpgradeList');
  el.innerHTML = '';
  for (const u of REINC_UPGRADES) {
    const bought = !!G.reincUpgrades[u.id];
    const canAfford = !bought && G.soulCrystals >= u.cost;
    const card = document.createElement('div');
    let cls = 'reinc-upg-card';
    if (bought) cls += ' bought';
    else if (canAfford) cls += ' can-afford';
    card.className = cls;
    card.onclick = () => openReincUpgradeModal(u.id);
    const typeLabel = u.type === 'click' ? 'クリック強化' : '全施設強化';
    card.innerHTML = `
      <div class="ruc-icon">${u.icon}</div>
      <div class="ruc-info">
        <h3>${u.name}</h3>
        <div class="ruc-desc">${typeLabel} ×${u.mult}</div>
      </div>
      <div class="ruc-right">
        <div class="ruc-cost">${bought ? '' : u.cost + ' ソウル'}</div>
        <div class="ruc-status ${bought ? 'owned' : 'locked'}">${bought ? '✓ 取得済み' : ''}</div>
      </div>`;
    el.appendChild(card);
  }
}

function renderAchievements() {
  const el = document.getElementById('achGrid');
  el.innerHTML = '';
  for (const a of ACHIEVEMENTS) {
    const unlocked = G.achievements.has(a.id);
    const item = document.createElement('div');
    item.className = 'ach-item' + (unlocked ? ' unlocked' : ' locked');
    item.textContent = a.icon;
    item.onclick = () => openAchModal(a.id);
    el.appendChild(item);
  }
}

function renderStats() {
  const el = document.getElementById('statsPanel');
  const ps = getPerSec();
  const elapsed = Math.floor((Date.now() - G.startTime) / 1000);
  const h = Math.floor(elapsed / 3600);
  const m = Math.floor((elapsed % 3600) / 60);
  const s = elapsed % 60;
  const totalFac = Object.values(G.facilities).reduce((a, b) => a + b, 0);
  const totalUpg = Object.values(G.upgrades).filter(Boolean).length;
  const stats = [
    ['現在のクリスタル', fmt(G.crystals)],
    ['累計クリスタル', fmt(G.totalCrystals)],
    ['全時間クリスタル', fmt(G.totalAllTime)],
    ['クリック値', fmt(getClickValue())],
    ['毎秒生産', fmt(ps)],
    ['総クリック数', fmtFull(G.totalClicks)],
    ['施設合計', totalFac],
    ['アップグレード', totalUpg + '/' + UPGRADES.length],
    ['ソウルクリスタル', fmtFull(G.soulCrystals)],
    ['累計ソウル', fmtFull(G.totalSoulCrystals)],
    ['ソウルボーナス', '+' + (G.soulCrystals * 5) + '%'],
    ['転生回数', G.reincarnations],
    ['実績', G.achievements.size + '/' + ACHIEVEMENTS.length],
    ['プレイ時間', `${h}h ${m}m ${s}s`],
  ];
  el.innerHTML = stats.map(([l, v]) =>
    `<div class="stat-row"><span class="stat-label">${l}</span><span class="stat-val">${v}</span></div>`
  ).join('');
}

function updateDisplays() {
  document.getElementById('crystalCount').textContent = fmt(G.crystals);
  document.getElementById('perSecDisplay').textContent = fmt(getPerSec());
  document.getElementById('hTotalClicks').textContent = fmtFull(G.totalClicks);
  document.getElementById('hReincs').textContent = G.reincarnations;
  document.getElementById('hSouls').textContent = fmtFull(G.soulCrystals);
  const nextSouls = calcReincSouls();
  document.getElementById('rCurSouls').textContent = fmtFull(G.soulCrystals);
  document.getElementById('rNextSouls').textContent = fmtFull(nextSouls);
  document.getElementById('rBonus').textContent = '+' + (G.soulCrystals * 5) + '%';
  document.getElementById('rNextBonus').textContent = '+' + ((G.soulCrystals + nextSouls) * 5) + '%';
  document.getElementById('reincBtn').disabled = nextSouls < 1;
}

function checkAchievements() {
  for (const a of ACHIEVEMENTS) {
    if (!G.achievements.has(a.id) && a.check()) {
      G.achievements.add(a.id);
      notify('🏆 実績解除: ' + a.name);
      renderAchievements();
    }
  }
}

function renderAll() {
  renderFacilities();
  renderUpgrades();
  renderReincUpgrades();
  renderAchievements();
  renderStats();
  updateDisplays();
}

// ==================== NAVIGATION ====================
function switchView(id, btn) {
  document.querySelectorAll('.panel-view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}

function setBuyAmount(n, btn) {
  buyAmount = n;
  document.querySelectorAll('.buy-amount .buy-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFacilities();
}

// ==================== NOTIFICATION ====================
function notify(msg) {
  const el = document.getElementById('notifs');
  const n = document.createElement('div');
  n.className = 'notif';
  n.textContent = msg;
  el.appendChild(n);
  setTimeout(() => n.remove(), 3000);
}

// ==================== STARS ====================
function createStars() {
  const el = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('span');
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.setProperty('--d', (2 + Math.random() * 4) + 's');
    s.style.animationDelay = Math.random() * 4 + 's';
    const size = (1 + Math.random() * 2) + 'px';
    s.style.width = s.style.height = size;
    el.appendChild(s);
  }
}

// ==================== SAVE / LOAD ====================
function saveGame() {
  try {
    const data = { ...G, achievements: [...G.achievements] };
    localStorage.setItem('cosmicCrystalPWA', JSON.stringify(data));
  } catch(e) {}
}
function loadGame() {
  try {
    const raw = localStorage.getItem('cosmicCrystalPWA');
    if (raw) {
      const d = JSON.parse(raw);
      Object.assign(G, d);
      G.achievements = new Set(d.achievements || []);
      // 旧セーブデータの互换性: runCrystalsがなければtotalCrystalsで代用
      if (G.runCrystals === undefined || G.runCrystals === null) {
        G.runCrystals = G.totalCrystals || 0;
      }
    }
  } catch(e) {}
}

// ==================== GAME LOOP ====================
let lastTick = Date.now();
function gameTick() {
  const now = Date.now();
  const dt = Math.min((now - lastTick) / 1000, 1); // cap at 1s
  lastTick = now;
  const production = getPerSec() * dt;
  G.crystals += production;
  G.totalCrystals += production;
  G.runCrystals += production;
  G.totalAllTime += production;
  updateDisplays();
  checkAchievements();
  if (now - G.lastSave > 30000) {
    saveGame();
    G.lastSave = now;
  }
}

let renderCounter = 0;
function renderTick() {
  renderCounter++;
  if (renderCounter % 10 === 0) renderFacilities();
  if (renderCounter % 30 === 0) { renderStats(); renderUpgrades(); renderReincUpgrades(); }
}

// ==================== PWA INSTALL ====================
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('installDismissed')) {
    document.getElementById('installBanner').classList.add('show');
  }
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBanner').classList.remove('show');
});
function dismissInstall() {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('installDismissed', '1');
}

// ==================== INIT ====================
function init() {
  createStars();
  loadGame();
  renderAll();

  const crystalBtn = document.getElementById('crystalBtn');
  crystalBtn.addEventListener('click', doClick);
  crystalBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    doClick(e.touches[0]);
  }, { passive: false });

  // Prevent double-tap zoom on crystal
  crystalBtn.addEventListener('touchend', (e) => e.preventDefault(), { passive: false });

  // Save on page hide
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) saveGame();
  });
  window.addEventListener('pagehide', saveGame);

  setInterval(gameTick, 50);
  setInterval(renderTick, 200);

  // Register Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

init();
</script>
